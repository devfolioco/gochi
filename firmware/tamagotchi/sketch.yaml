# arduino-cli build profile — pins the board + core version so the build
# is reproducible. Build with:  arduino-cli compile --profile c3
profiles:
  c3:
    fqbn: esp32:esp32:esp32c3:CDCOnBoot=cdc
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json

default_profile: c3
